<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b949e"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#56d364"/>
    </marker>
  </defs>

  <rect width="820" height="580" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="820" height="4" rx="2" fill="url(#accent)"/>
  <text x="410" y="34" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700">CloudLens &#8212; Architecture</text>

  <!-- Row 1: Config -->
  <g filter="url(#shadow)">
    <rect x="295" y="50" width="230" height="40" rx="10" fill="#21262d" stroke="#d29922" stroke-width="1.5"/>
    <text x="320" y="75" fill="#e3b341" font-size="11" font-weight="600">&#9881; Settings + Accounts</text>
    <text x="420" y="75" fill="#8b949e" font-size="9">pydantic-settings &#183; YAML</text>
  </g>

  <line x1="410" y1="90" x2="410" y2="110" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: Provider Registry -->
  <g filter="url(#shadow)">
    <rect x="255" y="114" width="310" height="40" rx="10" fill="#21262d" stroke="#8957e5" stroke-width="1.5"/>
    <text x="280" y="139" fill="#d2a8ff" font-size="11" font-weight="600">&#8635; Provider Registry + Fetcher</text>
    <text x="475" y="139" fill="#8b949e" font-size="9">async poll &#183; SSE</text>
  </g>

  <line x1="310" y1="154" x2="200" y2="180" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="154" x2="410" y2="180" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="154" x2="620" y2="180" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: Three Providers -->
  <g filter="url(#shadow)">
    <rect x="100" y="184" width="170" height="40" rx="10" fill="#21262d" stroke="#FF9900" stroke-width="1.5"/>
    <rect x="100" y="184" width="170" height="4" rx="2" fill="#FF9900" opacity="0.5"/>
    <text x="130" y="211" fill="#FF9900" font-size="11" font-weight="700">AWS</text>
    <text x="165" y="211" fill="#8b949e" font-size="9">EC2/VPC &#183; boto3</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="290" y="184" width="240" height="40" rx="10" fill="#21262d" stroke="#0078D4" stroke-width="1.5"/>
    <rect x="290" y="184" width="240" height="4" rx="2" fill="#0078D4" opacity="0.5"/>
    <text x="320" y="211" fill="#0078D4" font-size="11" font-weight="700">Azure</text>
    <text x="365" y="211" fill="#8b949e" font-size="9">Resource Graph &#183; KQL</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="550" y="184" width="170" height="40" rx="10" fill="#21262d" stroke="#4285F4" stroke-width="1.5"/>
    <rect x="550" y="184" width="170" height="4" rx="2" fill="#4285F4" opacity="0.5"/>
    <text x="580" y="211" fill="#4285F4" font-size="11" font-weight="700">GCP</text>
    <text x="610" y="211" fill="#8b949e" font-size="9">Compute API</text>
  </g>

  <!-- Normalizer -->
  <line x1="185" y1="224" x2="410" y2="250" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="410" y1="224" x2="410" y2="250" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="635" y1="224" x2="410" y2="250" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="310" y="254" width="200" height="30" rx="8" fill="#21262d" stroke="#64748b" stroke-width="1"/>
    <text x="410" y="274" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">NetworkResource (normalized)</text>
  </g>

  <!-- Split to Graph + Engine -->
  <line x1="340" y1="284" x2="260" y2="310" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="284" x2="560" y2="310" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 5 LEFT: Graph -->
  <g filter="url(#shadow)">
    <rect x="140" y="314" width="220" height="40" rx="10" fill="#21262d" stroke="#da3633" stroke-width="1.5"/>
    <text x="170" y="339" fill="#f85149" font-size="11" font-weight="600">&#9672; Graph Builders</text>
    <text x="290" y="339" fill="#8b949e" font-size="9">D3.js &#183; SVG</text>
  </g>

  <!-- Row 5 RIGHT: Engine -->
  <g filter="url(#shadow)">
    <rect x="460" y="314" width="240" height="40" rx="10" fill="#21262d" stroke="#0891b2" stroke-width="1.5"/>
    <text x="490" y="339" fill="#22d3ee" font-size="11" font-weight="600">&#9878; Analysis Engine</text>
    <text x="620" y="339" fill="#8b949e" font-size="9">diff &#183; health &#183; comply</text>
  </g>

  <!-- Arrows to FastAPI -->
  <line x1="250" y1="354" x2="340" y2="380" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="354" x2="480" y2="380" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 6: FastAPI -->
  <g filter="url(#shadow)">
    <rect x="210" y="384" width="400" height="40" rx="10" fill="#21262d" stroke="#2ea043" stroke-width="1.5"/>
    <text x="240" y="409" fill="#56d364" font-size="11" font-weight="600">&#9889; FastAPI</text>
    <text x="300" y="409" fill="#8b949e" font-size="9">topology &#183; changes &#183; health &#183; compliance &#183; incidents &#183; AI</text>
  </g>

  <line x1="410" y1="424" x2="410" y2="450" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 7: Frontend -->
  <g filter="url(#shadow)">
    <rect x="255" y="454" width="310" height="40" rx="10" fill="#21262d" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="285" y="479" fill="#58a6ff" font-size="11" font-weight="600">&#9673; D3.js Frontend</text>
    <text x="395" y="479" fill="#8b949e" font-size="9">graph &#183; health &#183; incidents &#183; AI chat</text>
  </g>

  <!-- Side: SQLite -->
  <g filter="url(#shadow)">
    <rect x="700" y="314" width="95" height="110" rx="10" fill="#21262d" stroke="#d29922" stroke-width="1.5"/>
    <text x="748" y="336" text-anchor="middle" fill="#e3b341" font-size="10" font-weight="600">SQLite</text>
    <text x="748" y="352" text-anchor="middle" fill="#8b949e" font-size="8">snapshots</text>
    <text x="748" y="364" text-anchor="middle" fill="#8b949e" font-size="8">changes</text>
    <text x="748" y="376" text-anchor="middle" fill="#8b949e" font-size="8">health</text>
    <text x="748" y="388" text-anchor="middle" fill="#8b949e" font-size="8">compliance</text>
    <text x="748" y="400" text-anchor="middle" fill="#8b949e" font-size="8">incidents</text>
    <text x="748" y="412" text-anchor="middle" fill="#8b949e" font-size="8">AI history</text>
  </g>
  <line x1="700" y1="370" x2="610" y2="404" stroke="#d29922" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Side: Claude AI -->
  <g filter="url(#shadow)">
    <rect x="20" y="360" width="100" height="64" rx="10" fill="#21262d" stroke="#db61a2" stroke-width="1.5"/>
    <text x="70" y="385" text-anchor="middle" fill="#f778ba" font-size="11" font-weight="600">&#10024; Claude</text>
    <text x="70" y="400" text-anchor="middle" fill="#8b949e" font-size="8">NL queries</text>
    <text x="70" y="412" text-anchor="middle" fill="#8b949e" font-size="8">RCA &#183; anomaly</text>
  </g>
  <line x1="120" y1="400" x2="210" y2="404" stroke="#db61a2" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- SSE arrow -->
  <path d="M 565 474 C 650 474 650 134 560 134" fill="none" stroke="#56d364" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-green)" opacity="0.6"/>
  <text x="640" y="310" fill="#56d364" font-size="9" font-weight="600" transform="rotate(90 640 310)" text-anchor="middle" opacity="0.6">SSE push</text>

  <!-- Legend -->
  <g transform="translate(24, 520)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#FF9900"/>
    <text x="14" y="8" fill="#8b949e" font-size="9">AWS</text>
    <rect x="50" y="0" width="8" height="8" rx="2" fill="#0078D4"/>
    <text x="64" y="8" fill="#8b949e" font-size="9">Azure</text>
    <rect x="110" y="0" width="8" height="8" rx="2" fill="#4285F4"/>
    <text x="124" y="8" fill="#8b949e" font-size="9">GCP</text>
    <rect x="170" y="0" width="8" height="8" rx="2" fill="#da3633"/>
    <text x="184" y="8" fill="#8b949e" font-size="9">graph/</text>
    <rect x="225" y="0" width="8" height="8" rx="2" fill="#0891b2"/>
    <text x="239" y="8" fill="#8b949e" font-size="9">engine/</text>
    <rect x="285" y="0" width="8" height="8" rx="2" fill="#2ea043"/>
    <text x="299" y="8" fill="#8b949e" font-size="9">api/</text>
    <rect x="325" y="0" width="8" height="8" rx="2" fill="#d29922"/>
    <text x="339" y="8" fill="#8b949e" font-size="9">db/</text>
    <rect x="365" y="0" width="8" height="8" rx="2" fill="#db61a2"/>
    <text x="379" y="8" fill="#8b949e" font-size="9">ai/</text>
    <rect x="405" y="0" width="8" height="8" rx="2" fill="#1f6feb"/>
    <text x="419" y="8" fill="#8b949e" font-size="9">static/</text>
  </g>

  <text x="410" y="568" text-anchor="middle" fill="#30363d" font-size="8">CloudLens &#183; AI-powered multi-cloud network intelligence</text>
</svg>
