<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Network nodes background -->
  <g opacity="0.08">
    <circle cx="100" cy="80" r="30" fill="#3b82f6"/>
    <circle cx="200" cy="180" r="20" fill="#22c55e"/>
    <circle cx="320" cy="100" r="25" fill="#f59e0b"/>
    <circle cx="150" cy="240" r="15" fill="#ef4444"/>
    <circle cx="280" cy="220" r="22" fill="#8b5cf6"/>
    <circle cx="900" cy="60" r="28" fill="#FF9900"/>
    <circle cx="1020" cy="150" r="18" fill="#0078D4"/>
    <circle cx="1100" cy="90" r="24" fill="#4285F4"/>
    <circle cx="950" cy="230" r="20" fill="#22c55e"/>
    <circle cx="1080" cy="240" r="16" fill="#f59e0b"/>
    <line x1="100" y1="80" x2="200" y2="180" stroke="#3b82f6" stroke-width="1"/>
    <line x1="200" y1="180" x2="320" y2="100" stroke="#22c55e" stroke-width="1"/>
    <line x1="320" y1="100" x2="280" y2="220" stroke="#f59e0b" stroke-width="1"/>
    <line x1="150" y1="240" x2="280" y2="220" stroke="#ef4444" stroke-width="1"/>
    <line x1="900" y1="60" x2="1020" y2="150" stroke="#FF9900" stroke-width="1"/>
    <line x1="1020" y1="150" x2="1100" y2="90" stroke="#0078D4" stroke-width="1"/>
    <line x1="1100" y1="90" x2="950" y2="230" stroke="#4285F4" stroke-width="1"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(420, 70)" filter="url(#glow)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="30" cy="30" r="8" fill="#3b82f6" opacity="0.6"/>
    <circle cx="12" cy="14" r="5" fill="#FF9900" opacity="0.8"/>
    <circle cx="48" cy="14" r="5" fill="#0078D4" opacity="0.8"/>
    <circle cx="30" cy="52" r="5" fill="#4285F4" opacity="0.8"/>
    <line x1="30" y1="30" x2="12" y2="14" stroke="#94a3b8" stroke-width="1"/>
    <line x1="30" y1="30" x2="48" y2="14" stroke="#94a3b8" stroke-width="1"/>
    <line x1="30" y1="30" x2="30" y2="52" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="480" y="105" fill="#f1f5f9" font-size="42" font-weight="800" letter-spacing="-1">CloudLens</text>

  <!-- Subtitle -->
  <text x="420" y="145" fill="#94a3b8" font-size="16" font-weight="500">AI-Powered Multi-Cloud Network Intelligence Platform</text>

  <!-- Provider badges -->
  <g transform="translate(420, 170)">
    <rect x="0" y="0" width="54" height="24" rx="6" fill="#FF990020" stroke="#FF990060" stroke-width="1"/>
    <text x="27" y="16" text-anchor="middle" fill="#FF9900" font-size="11" font-weight="700">AWS</text>
    <rect x="64" y="0" width="62" height="24" rx="6" fill="#0078D420" stroke="#0078D460" stroke-width="1"/>
    <text x="95" y="16" text-anchor="middle" fill="#0078D4" font-size="11" font-weight="700">Azure</text>
    <rect x="136" y="0" width="54" height="24" rx="6" fill="#4285F420" stroke="#4285F460" stroke-width="1"/>
    <text x="163" y="16" text-anchor="middle" fill="#4285F4" font-size="11" font-weight="700">GCP</text>
  </g>

  <!-- Feature pills -->
  <g transform="translate(420, 215)">
    <rect x="0" y="0" width="120" height="22" rx="11" fill="#22c55e15" stroke="#22c55e40" stroke-width="1"/>
    <text x="60" y="15" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">Change Tracking</text>
    <rect x="130" y="0" width="110" height="22" rx="11" fill="#ef444415" stroke="#ef444440" stroke-width="1"/>
    <text x="185" y="15" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Health Checks</text>
    <rect x="250" y="0" width="100" height="22" rx="11" fill="#f59e0b15" stroke="#f59e0b40" stroke-width="1"/>
    <text x="300" y="15" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Compliance</text>
    <rect x="360" y="0" width="110" height="22" rx="11" fill="#8b5cf615" stroke="#8b5cf640" stroke-width="1"/>
    <text x="415" y="15" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600">AI Intelligence</text>
    <rect x="480" y="0" width="110" height="22" rx="11" fill="#3b82f615" stroke="#3b82f640" stroke-width="1"/>
    <text x="535" y="15" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">Blast Radius</text>
  </g>

  <!-- Bottom bar -->
  <text x="420" y="275" fill="#475569" font-size="11">Open source · Python 3.12 · FastAPI · D3.js · Claude AI</text>
</svg>
